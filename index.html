<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>termkeyboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; background: #000; }
    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #app {
      width: 540px;
      height: 620px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    /* ── TERMINAL ──────────────────────────────── */
    #terminal {
      flex: 1 1 0;
      min-height: 0;
      background: #161616;
      overflow-y: auto;
      padding: 10px 20px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }
    #terminal::-webkit-scrollbar { width: 3px; }
    #terminal::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    /* Every line in the terminal */
    .line {
      font-size: 16px;
      line-height: 1.25;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 1.25em;
    }

    /* Output lines */
    .line-out  { color: #E0E0E0; }
    .line-err  { color: #E05050; }
    .line-info { color: #E26600; }

    /* Prompt colors */
    .p-name { color: #E26600; }
    .p-col  { color: #E26600; }
    .p-path { color: #E26600; }
    .p-dol  { color: #E26600; }
    .p-text { color: #E0E0E0; }

    /* Blinking block cursor */
    .p-cursor {
      display: inline-block;
      width: 7.8px;
      height: 1em;
      background: #E0E0E0;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .p-sel { background: rgba(226,102,0,0.25); border-radius: 2px; }

    /* ── KEYBOARD WRAPPER ──────────────────────── */
    #keyboard {
      flex-shrink: 0;
      background: #0B0B0B;
      padding-top: 4px;
      width: 540px;
    }

    /* ── ROW 0: TERMINAL SPECIAL KEYS (scrollable) ── */
    #row-term {
      position: relative;
      height: 61px;
      background: #0b0b0b;
      backdrop-filter: blur(11px);
      overflow: hidden;
      flex-shrink: 0;
    }
    #row-term-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      height: 100%;
      overflow-x: scroll;
      scrollbar-width: none;
      cursor: grab;
      touch-action: none;
    }
    #row-term-inner::-webkit-scrollbar { display: none; }
    .row-term-fade {
      position: absolute;
      top: 0; bottom: 0;
      pointer-events: none;
    }
    .row-term-fade-l {
      left: 0;
      width: 40px;
      background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
    }
    .row-term-fade-r {
      right: 0;
      width: 100px;
      background: linear-gradient(to right, rgba(0,0,0,0) 0%, #000 100%);
    }

    .tkey {
      height: 45px;
      background: #3a3a3a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ddd;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: 0 10px;
    }
    .tkey:active, .tkey.on { background: #555; }
    .tkey-tab  { width: 50px; }
    .tkey-ctrl { width: 55px; }
    .tkey-sft  { width: 58px; }
    .tkey-s36  { width: 36px; padding: 0 6px; }
    .tkey-s38  { width: 38px; padding: 0 6px; }

    /* ── KEYBOARD BODY ─────────────────────────── */
    #kbd-body {
      padding-bottom: 12px;
    }

    /*
      Key grid for 540px (44px keys, 10px gap):
      QWERTY:    10×44 + 9×10 = 530px centred in 540
      ASDFGHJKL: 9×44  + 8×10 = 476px centred in 540
      ZXCVBNM:   7×44  + 6×10 = 368px centred in 540

      Trackpoint between G/H and V/B:
        G right=292, H left=302 → x-centre=297 → left=297-17=280
        Row2 bottom≈107, Row3 top≈116 → top=97 (Figma)
    */
    #keys-layout {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 9px;
      padding: 10px 0;
      width: 540px;
    }

    .key {
      width: 44px;
      height: 44px;
      background: #3a3a3a;
      border: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ddd;
      font-size: 20px;
      box-shadow: 0 1px 0 #222;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .key:active { background: #555; }

    .row {
      display: flex;
      gap: 10px;
      height: 44px;
      align-items: center;
      justify-content: center;
    }
    .row-pad { padding: 0 5px; }

    .alpha-row   { display: flex; }
    .num-row     { display: none; }
    .alpha-shift { display: block; }
    .num-shift   { display: none; }
    body.num-mode .alpha-row   { display: none; }
    body.num-mode .num-row     { display: flex; }
    body.num-mode .alpha-shift { display: none; }
    body.num-mode .num-shift   { display: block; }

    .row-shift {
      position: relative;
      height: 44px;
      width: 540px;
    }
    .key-shift {
      position: absolute;
      left: 12px; top: 0;
      width: 64px; height: 44px;
      background: #636363;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px; color: #ddd;
      box-shadow: 0 1px 0 #222;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .key-shift:active, .key-shift.on { background: #888; }

    .key-del {
      position: absolute;
      right: 12px; top: 0;
      width: 64px; height: 44px;
      background: #474747;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px; color: #ddd;
      box-shadow: 0 1px 0 #2a2a2a;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .key-del:active { background: #666; }

    /* ── TRACKPOINT ────────────────────────────── */
    #trackpoint {
      position: absolute;
      top: 97px; left: 280px;
      width: 34px; height: 34px;
      background: #151515;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    #trackpoint.dragging { cursor: grabbing; }
    #tp-nub {
      width: 16px; height: 16px;
      border-radius: 3px;
      background: #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #tp-nub::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ddd;
    }
    /* Extend hit area without changing the visual */
    #trackpoint::before {
      content: '';
      position: absolute;
      inset: -7px;
    }

    /* ── BOTTOM ROW ────────────────────────────── */
    #row-bottom {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 0 10px;
      height: 44px;
    }
    .bkey {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      color: #ddd;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .bkey:active { filter: brightness(1.4); }
    .bkey-kbd   { display: none; }
    .bkey-123   { width: 64px; background: #2d2d2d; font-size: 16px; font-weight: 700; box-shadow: 0 1.125px 0 #2a2a2a; }
    .bkey-fn    { width: 40px; background: #2d2d2d; font-size: 18px; font-weight: 500; box-shadow: 0 1.125px 0 #2a2a2a; }
    .bkey-comma { width: 40px; background: #2d2d2d; font-size: 18px; box-shadow: 0 1.125px 0 #2a2a2a; }
    .bkey-space { flex: 1 1 0; min-width: 0; background: #474747; border: 1px solid #474747; font-size: 18px; box-shadow: 0 1px 0 #222; color: #555; }
    .bkey-dot   { width: 44px; background: #2d2d2d; font-size: 18px; font-weight: 500; box-shadow: 0 1.125px 0 #2a2a2a; }
    .bkey-done  { width: 70px; background: #636363; font-size: 20px; box-shadow: 0 1.125px 0 #2a2a2a; color: #eee; }

    /* ── VARIANT TOGGLE ───────────────────────────── */
    #variant-toggle {
      display: flex;
      gap: 2px;
      padding: 0 10px;
      background: #0a0a0a;
      border-bottom: 1px solid #181818;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
      height: 20px;
    }
    .vtab {
      width: 18px; height: 14px;
      font-size: 10px;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px;
      color: #444;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .vtab.active { background: #252525; color: #bbb; }

    /* ── VARIANT 2 overrides ───────────────────────── */
    body.v2 #trackpoint { display: none; }

    /* ── VARIANT 3 overrides ───────────────────────── */
    /* kbd-body + terminal become a giant trackpad; touch-action off so pointer events fire cleanly */
    body.v3 #terminal { touch-action: none; }
    body.v3 #kbd-body  { touch-action: none; }
    /* Keys animate when drag begins */
    body.v3 .key,
    body.v3 .key-shift,
    body.v3 .key-del,
    body.v3 .bkey { transition: color 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease; }
    /* While dragging: dim labels, darken keys */
    body.v3-dragging .key {
      color: rgba(221,221,221,0.18);
      background: #232323;
      border-color: #232323;
      box-shadow: none;
    }
    body.v3-dragging .key-shift { color: rgba(221,221,221,0.18); background: #2f2f2f; }
    body.v3-dragging .key-del   { color: rgba(221,221,221,0.18); background: #292929; }
    body.v3-dragging .bkey      { color: rgba(221,221,221,0.15); }
    body.v3-dragging .bkey-kbd svg { opacity: 0.15; }
    /* V3 joystick: trackpoint expands to 80px circle on drag */
    .v3-sec {
      display: none;
      position: absolute;
      inset: 0;
      transition: background 0.08s;
    }
    .v3-dividers { display: none; position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    #v3-sec-up    { clip-path: polygon(0% 0%, 100% 0%, 50% 50%); }
    #v3-sec-right { clip-path: polygon(100% 0%, 100% 100%, 50% 50%); }
    #v3-sec-down  { clip-path: polygon(100% 100%, 0% 100%, 50% 50%); }
    #v3-sec-left  { clip-path: polygon(0% 100%, 0% 0%, 50% 50%); }
    .v3-sec.active { background: rgba(255,255,255,0.14); }
    body.v3 #trackpoint {
      transition: width 0.1s ease, height 0.1s ease, top 0.1s ease, left 0.1s ease, border-radius 0.1s ease, background 0.1s ease;
    }
    body.v3 #trackpoint.dragging {
      width: 80px; height: 80px;
      border-radius: 50%;
      top: 74px; left: 257px;
      overflow: hidden;
      border: 1.5px solid #555;
      background: #1a1a1a;
      box-shadow: 0 2px 14px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
    }
    body.v3 #trackpoint.dragging .v3-sec { display: block; }
    body.v3 #trackpoint.dragging .v3-dividers { display: block; }
    body.v3 #trackpoint.dragging #tp-nub { z-index: 2; position: relative; }
    body.v3 #tp-nub { transition: none; }
    body.v2 .bkey-space {
      align-items: flex-end;
      padding-bottom: 5px;
      color: #2e2e2e;
      font-size: 11px;
      cursor: grab;
      touch-action: none;
    }
    body.v2 .bkey-space:active { filter: none; }
    /* Animate keys when spacebar drag begins */
    body.v2 .key,
    body.v2 .key-shift,
    body.v2 .key-del,
    body.v2 .bkey { transition: color 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease; }
    /* While dragging: dim all keys, keep spacebar lit as the active control */
    body.v2-dragging .key {
      color: rgba(221,221,221,0.18);
      background: #232323;
      border-color: #232323;
      box-shadow: none;
    }
    body.v2-dragging .key-shift { color: rgba(221,221,221,0.18); background: #2f2f2f; }
    body.v2-dragging .key-del   { color: rgba(221,221,221,0.18); background: #292929; }
    body.v2-dragging .bkey:not(.bkey-space) { color: rgba(221,221,221,0.15); }
    body.v2-dragging .bkey-kbd svg { opacity: 0.15; }
    body.v2-dragging .bkey-space { background: #555; color: #888; cursor: grabbing; }

    /* ── RADIAL TRACKPOINT OVERLAY ────────────────── */
    #tp-radial {
      position: fixed;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(20,20,20,0.92);
      z-index: 300;
      transform: translate(-50%,-50%);
      pointer-events: none;
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07);
      opacity: 0;
    }
    #tp-radial.visible {
      opacity: 1;
    }
    .tp-sec {
      position: absolute;
      inset: 0;
      transition: background 0.08s;
    }
    #sec-up    { clip-path: polygon(0% 0%, 100% 0%, 50% 50%); }
    #sec-right { clip-path: polygon(100% 0%, 100% 100%, 50% 50%); }
    #sec-down  { clip-path: polygon(100% 100%, 0% 100%, 50% 50%); }
    #sec-left  { clip-path: polygon(0% 100%, 0% 0%, 50% 50%); }
    .tp-sec.active { background: rgba(255,255,255,0.14); }
    .tp-arr {
      position: absolute;
      color: rgba(200,200,200,0.45);
      font-size: 15px;
      line-height: 1;
      transition: color 0.08s;
      pointer-events: none;
    }
    .tp-arr.active { color: #fff; }
    .tp-arr-up    { top: 5px;    left: 50%; transform: translateX(-50%); }
    .tp-arr-right { right: 5px;  top: 50%;  transform: translateY(-50%); }
    .tp-arr-down  { bottom: 5px; left: 50%; transform: translateX(-50%); }
    .tp-arr-left  { left: 5px;   top: 50%;  transform: translateY(-50%); }
  </style>
</head>
<body>
<div id="app">

  <!-- ── VARIANT TOGGLE ────────────────────────────────── -->
  <div id="variant-toggle">
    <span class="vtab active" id="vt1" data-v="1">1</span>
    <span class="vtab"        id="vt2" data-v="2">2</span>
    <span class="vtab"        id="vt3" data-v="3">3</span>
  </div>

  <!-- ── TERMINAL: single scrollable area, prompt inline ── -->
  <div id="terminal"></div>

  <!-- ── KEYBOARD ──────────────────────────────────────── -->
  <div id="keyboard">
    <div id="row-term">
      <div id="row-term-inner">
        <div class="tkey tkey-tab"  data-action="tab">tab</div>
        <div class="tkey tkey-ctrl" data-action="ctrl" id="btn-ctrl">ctrl</div>
        <div class="tkey tkey-sft"  data-action="shift" id="btn-shift-top">shift</div>
        <div class="tkey tkey-s36"  data-char="|">|</div>
        <div class="tkey tkey-s36"  data-char="~">~</div>
        <div class="tkey tkey-s36"  data-char="/">/</div>
        <div class="tkey tkey-s36"  data-char="-">-</div>
        <div class="tkey tkey-s38"  data-char=":">:</div>
        <div class="tkey tkey-s38"  data-char="*">*</div>
        <div class="tkey tkey-s38"  data-char=">">&gt;</div>
        <div class="tkey tkey-s38"  data-char="&amp;">&amp;</div>
      </div>
      <div class="row-term-fade row-term-fade-l"></div>
      <div class="row-term-fade row-term-fade-r"></div>
    </div>

    <div id="kbd-body">
      <div id="keys-layout">

        <div class="row alpha-row">
          <div class="key" data-char="q">Q</div><div class="key" data-char="w">W</div>
          <div class="key" data-char="e">E</div><div class="key" data-char="r">R</div>
          <div class="key" data-char="t">T</div><div class="key" data-char="y">Y</div>
          <div class="key" data-char="u">U</div><div class="key" data-char="i">I</div>
          <div class="key" data-char="o">O</div><div class="key" data-char="p">P</div>
        </div>
        <div class="row num-row">
          <div class="key" data-char="1">1</div><div class="key" data-char="2">2</div>
          <div class="key" data-char="3">3</div><div class="key" data-char="4">4</div>
          <div class="key" data-char="5">5</div><div class="key" data-char="6">6</div>
          <div class="key" data-char="7">7</div><div class="key" data-char="8">8</div>
          <div class="key" data-char="9">9</div><div class="key" data-char="0">0</div>
        </div>

        <div class="row row-pad alpha-row">
          <div class="key" data-char="a">A</div><div class="key" data-char="s">S</div>
          <div class="key" data-char="d">D</div><div class="key" data-char="f">F</div>
          <div class="key" data-char="g">G</div><div class="key" data-char="h">H</div>
          <div class="key" data-char="j">J</div><div class="key" data-char="k">K</div>
          <div class="key" data-char="l">L</div>
        </div>
        <div class="row row-pad num-row">
          <div class="key" data-char="@">@</div><div class="key" data-char="#">#</div>
          <div class="key" data-char="$">$</div><div class="key" data-char="%">%</div>
          <div class="key" data-char="^">^</div><div class="key" data-char="(">(</div>
          <div class="key" data-char=")">)</div><div class="key" data-char="[">[</div>
          <div class="key" data-char="]">]</div>
        </div>

        <div class="row-shift alpha-shift">
          <div class="key-shift" data-action="shift" id="btn-shift">⇧</div>
          <div class="row" style="position:absolute;left:50%;transform:translateX(-50%);top:0;gap:10px;">
            <div class="key" data-char="z">Z</div><div class="key" data-char="x">X</div>
            <div class="key" data-char="c">C</div><div class="key" data-char="v">V</div>
            <div class="key" data-char="b">B</div><div class="key" data-char="n">N</div>
            <div class="key" data-char="m">M</div>
          </div>
          <div class="key-del" data-action="del">⌫</div>
        </div>

        <div class="row-shift num-shift">
          <div class="key-shift" style="font-size:13px;" data-action="noop">#+&lt;</div>
          <div class="row" style="position:absolute;left:50%;transform:translateX(-50%);top:0;gap:10px;">
            <div class="key" data-char="!">!</div><div class="key" data-char="=">=</div>
            <div class="key" data-char="+">&plus;</div><div class="key" data-char="{">{</div>
            <div class="key" data-char="}">}</div><div class="key" data-char="\">\</div>
            <div class="key" data-char="?">?</div>
          </div>
          <div class="key-del" data-action="del">⌫</div>
        </div>

        <div id="trackpoint">
          <div class="v3-sec" id="v3-sec-up"></div>
          <div class="v3-sec" id="v3-sec-right"></div>
          <div class="v3-sec" id="v3-sec-down"></div>
          <div class="v3-sec" id="v3-sec-left"></div>
          <svg class="v3-dividers" viewBox="0 0 80 80"><line x1="0" y1="0" x2="80" y2="80" stroke="rgba(255,255,255,0.11)" stroke-width="1"/><line x1="80" y1="0" x2="0" y2="80" stroke="rgba(255,255,255,0.11)" stroke-width="1"/></svg>
          <div id="tp-nub"></div>
        </div>

      </div>

      <div id="row-bottom">
        <div class="bkey bkey-kbd">
          <svg width="26" height="22" viewBox="0 0 26 22" fill="none">
            <rect x="1" y="1" width="24" height="20" rx="3" stroke="#bbb" stroke-width="1.5"/>
            <line x1="5" y1="7"  x2="21" y2="7"  stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="5" y1="12" x2="21" y2="12" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="5" y1="17" x2="13" y2="17" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="bkey bkey-123" id="btn-123" data-action="toggle-num">?123</div>
        <div class="bkey bkey-fn"  data-action="fn">Fn</div>
        <div class="bkey bkey-comma" data-char=",">,</div>
        <div class="bkey bkey-space" data-char=" ">_</div>
        <div class="bkey bkey-dot"  data-char=".">.</div>
        <div class="bkey bkey-done" data-action="enter">Done</div>
      </div>
    </div>
  </div>
</div>

<!-- Radial trackpoint overlay — lives outside #app so fixed positioning is viewport-relative -->
<div id="tp-radial">
  <div class="tp-sec" id="sec-up"></div>
  <div class="tp-sec" id="sec-right"></div>
  <div class="tp-sec" id="sec-down"></div>
  <div class="tp-sec" id="sec-left"></div>
  <svg viewBox="0 0 120 120" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
    <line x1="0" y1="0"   x2="120" y2="120" stroke="rgba(255,255,255,0.11)" stroke-width="1.5"/>
    <line x1="120" y1="0" x2="0"   y2="120" stroke="rgba(255,255,255,0.11)" stroke-width="1.5"/>
  </svg>
  <div class="tp-arr tp-arr-up">↑</div>
  <div class="tp-arr tp-arr-right">→</div>
  <div class="tp-arr tp-arr-down">↓</div>
  <div class="tp-arr tp-arr-left">←</div>
</div>

<script>
  const term    = document.getElementById('terminal');
  const btnShift = document.getElementById('btn-shift');
  const btnCtrl  = document.getElementById('btn-ctrl');
  const btn123   = document.getElementById('btn-123');
  const trackpoint = document.getElementById('trackpoint');

  // ── Terminal state ────────────────────────────
  let input      = '';
  let cursorPos  = 0;
  let shift      = false;
  let ctrl       = false;
  let numMode    = false;
  let history    = [];
  let histIdx    = -1;
  let savedInput = '';

  // Active prompt line + selection state
  let activeLine   = null;
  let selectAnchor = null; // null = no selection; number = anchor end of selection

  // ── Prompt HTML template ──────────────────────
  const PROMPT =
    '<span class="p-name">user@termkeyboard</span>' +
    '<span class="p-col">:</span>' +
    '<span class="p-path">~</span>' +
    '<span class="p-dol">$</span> ';

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Build input HTML (handles cursor + selection) ─
  function getInputHTML() {
    const e = esc;
    if (selectAnchor === null || selectAnchor === cursorPos) {
      return '<span class="p-text">' + e(input.slice(0, cursorPos)) + '</span>' +
             '<span class="p-cursor"> </span>' +
             '<span class="p-text">' + e(input.slice(cursorPos)) + '</span>';
    }
    const s0  = Math.min(selectAnchor, cursorPos);
    const s1  = Math.max(selectAnchor, cursorPos);
    const pre = e(input.slice(0, s0));
    const sel = e(input.slice(s0, s1));
    const post= e(input.slice(s1));
    if (cursorPos <= selectAnchor) { // cursor at left of selection
      return '<span class="p-text">' + pre + '</span>' +
             '<span class="p-cursor"> </span>' +
             '<span class="p-sel">' + sel + '</span>' +
             '<span class="p-text">' + post + '</span>';
    } else {                         // cursor at right of selection
      return '<span class="p-text">' + pre + '</span>' +
             '<span class="p-sel">' + sel + '</span>' +
             '<span class="p-cursor"> </span>' +
             '<span class="p-text">' + post + '</span>';
    }
  }

  // ── Spawn a new prompt line at the bottom ─────
  function newPrompt() {
    activeLine = document.createElement('div');
    activeLine.className = 'line';
    term.appendChild(activeLine);
    render();
  }

  // ── Freeze active line into a static cmd line ─
  function freezeLine(cmdText, cls) {
    activeLine.innerHTML = PROMPT + '<span class="' + (cls||'p-text') + '">' + esc(cmdText) + '</span>';
    activeLine = null;
    selectAnchor = null;
  }

  function scroll() { term.scrollTop = term.scrollHeight; }

  // ── Render live input into the active line ────
  function render() {
    if (!activeLine) return;
    activeLine.innerHTML = PROMPT + getInputHTML();
    scroll();
  }

  // ── Selection helpers ─────────────────────────
  function clearSel() { selectAnchor = null; }

  function deleteSelection() {
    if (selectAnchor === null || selectAnchor === cursorPos) return false;
    const s0 = Math.min(selectAnchor, cursorPos);
    const s1 = Math.max(selectAnchor, cursorPos);
    input = input.slice(0, s0) + input.slice(s1);
    cursorPos = s0;
    selectAnchor = null;
    return true;
  }

  // ── Word boundary helpers ─────────────────────
  function wordLeft() {
    let p = cursorPos;
    while (p > 0 && /\s/.test(input[p-1])) p--;
    while (p > 0 && /\S/.test(input[p-1])) p--;
    return p;
  }

  function wordRight() {
    let p = cursorPos;
    while (p < input.length && /\s/.test(input[p])) p++;
    while (p < input.length && /\S/.test(input[p])) p++;
    return p;
  }

  // ── Append an output line (below active line) ─
  function appendOutput(text, cls) {
    // Insert before activeLine so output appears between cmd and next prompt
    const d = document.createElement('div');
    d.className = 'line ' + cls;
    d.textContent = text;
    if (activeLine) {
      term.insertBefore(d, activeLine);
    } else {
      term.appendChild(d);
    }
    scroll();
  }

  // ── Run a command ─────────────────────────────
  function runCommand(cmd) {
    const trimmed = cmd.trim();

    // Freeze the active prompt line as a submitted command
    freezeLine(cmd, 'p-text');

    // Add to history
    if (trimmed) { history.unshift(trimmed); histIdx = -1; savedInput = ''; }

    // Process
    const parts = trimmed.split(/\s+/);
    const base  = parts[0] ? parts[0].toLowerCase() : '';
    const args  = parts.slice(1).join(' ');

    switch (base) {
      case '':    break;
      case 'clear': case 'cls':
        term.innerHTML = '';
        break;
      case 'echo':
        appendOutput(args, 'line-out');
        break;
      case 'help':
        ['clear/cls   — clear screen',
         'echo <text> — print text',
         'date        — show date/time',
         'pwd         — working directory',
         'env         — environment vars',
         'CTRL+C  cancel input',
         'CTRL+L  clear screen',
         'CTRL+U  clear line   CTRL+W  delete word',
         'trackpoint  — drag for ← → ↑ ↓']
        .forEach(l => appendOutput(l, 'line-info'));
        break;
      case 'date':
        appendOutput(new Date().toString(), 'line-out');
        break;
      case 'pwd':
        appendOutput('/home/user', 'line-out');
        break;
      case 'env':
        ['TERM=termkeyboard','SHELL=/bin/bash','USER=user','HOME=/home/user']
        .forEach(l => appendOutput(l, 'line-out'));
        break;
      default:
        appendOutput('bash: ' + base + ': command not found', 'line-err');
    }

    // New prompt
    input = ''; cursorPos = 0;
    newPrompt();
    render();
  }

  // ── Type a character at cursor position ───────
  function typeChar(ch) {
    deleteSelection();
    input = input.slice(0, cursorPos) + ch + input.slice(cursorPos);
    cursorPos++;
    render();
  }

  // ── Arrow keys / history / selection ─────────
  function handleArrow(dir) {
    // Apply on-screen modifier toggles to bare arrow directions
    if (dir === 'left' || dir === 'right') {
      const word = ctrl;
      const sel  = shift;
      if (word && sel)  dir = dir === 'left' ? 'sel-word-left'  : 'sel-word-right';
      else if (word)    dir = dir === 'left' ? 'word-left'       : 'word-right';
      else if (sel)     dir = dir === 'left' ? 'sel-left'        : 'sel-right';
    }
    switch (dir) {
      case 'left':
        clearSel(); if (cursorPos > 0) { cursorPos--; render(); } break;
      case 'right':
        clearSel(); if (cursorPos < input.length) { cursorPos++; render(); } break;
      case 'word-left':
        clearSel(); cursorPos = wordLeft(); render(); break;
      case 'word-right':
        clearSel(); cursorPos = wordRight(); render(); break;
      case 'sel-left':
        if (selectAnchor === null) selectAnchor = cursorPos;
        if (cursorPos > 0) { cursorPos--; render(); } break;
      case 'sel-right':
        if (selectAnchor === null) selectAnchor = cursorPos;
        if (cursorPos < input.length) { cursorPos++; render(); } break;
      case 'sel-word-left':
        if (selectAnchor === null) selectAnchor = cursorPos;
        cursorPos = wordLeft(); render(); break;
      case 'sel-word-right':
        if (selectAnchor === null) selectAnchor = cursorPos;
        cursorPos = wordRight(); render(); break;
      case 'up':
        clearSel();
        if (!history.length) return;
        if (histIdx === -1) savedInput = input;
        histIdx = Math.min(history.length - 1, histIdx + 1);
        input = history[histIdx]; cursorPos = input.length; render(); break;
      case 'down':
        clearSel();
        if (histIdx === -1) return;
        histIdx--;
        input = histIdx === -1 ? savedInput : history[histIdx];
        cursorPos = input.length; render(); break;
    }
  }

  // ── Action dispatcher ─────────────────────────
  function handleAction(act) {
    switch (act) {
      case 'shift':
        shift = !shift;
        btnShift.classList.toggle('on', shift);
        document.getElementById('btn-shift-top').classList.toggle('on', shift);
        if (!shift) clearSel();   // turning shift off collapses selection
        break;
      case 'del':
        if (deleteSelection()) {
          // selection always wins; also clear all modifier toggles
          shift = false; btnShift.classList.remove('on');
          document.getElementById('btn-shift-top').classList.remove('on');
          ctrl  = false; btnCtrl.classList.remove('on');
          render(); break;
        }
        if (ctrl) {
          // ctrl+⌫ = delete word backward; keep ctrl ON for repeated deletes
          const before = input.slice(0, cursorPos).replace(/\S+\s*$/, '');
          input = before + input.slice(cursorPos);
          cursorPos = before.length; render();
        } else if (cursorPos > 0) {
          input = input.slice(0, cursorPos - 1) + input.slice(cursorPos);
          cursorPos--; render();
        }
        break;
      case 'enter':
        clearSel(); runCommand(input); break;
      case 'esc':
        clearSel(); input = ''; cursorPos = 0;
        shift = false; btnShift.classList.remove('on');
        render(); break;
      case 'tab':
        input = input.slice(0, cursorPos) + '  ' + input.slice(cursorPos);
        cursorPos += 2; render(); break;
      case 'ctrl':
        ctrl = !ctrl; btnCtrl.classList.toggle('on', ctrl); break;
      case 'toggle-num':
        numMode = !numMode;
        document.body.classList.toggle('num-mode', numMode);
        btn123.textContent = numMode ? 'ABC' : '?123'; break;
      case 'fn': case 'noop': break;
    }
  }

  // ── CTRL + letter combos ──────────────────────
  function handleCtrlKey(k) {
    ctrl = false; btnCtrl.classList.remove('on');
    clearSel();
    switch (k) {
      case 'c':
        // Show ^C on current line, then new prompt
        freezeLine(input + '^C', 'line-err');
        input = ''; cursorPos = 0;
        newPrompt(); render();
        break;
      case 'l':
        // Clear screen, keep active line
        if (activeLine) {
          term.innerHTML = '';
          term.appendChild(activeLine);
        } else {
          term.innerHTML = '';
          newPrompt(); render();
        }
        break;
      case 'u':
        input = ''; cursorPos = 0; render(); break;
      case 'w': {
        const before = input.slice(0, cursorPos).replace(/\S+\s*$/, '');
        input = before + input.slice(cursorPos);
        cursorPos = before.length; render(); break;
      }
    }
  }

  // ── On-screen keyboard clicks ─────────────────
  document.addEventListener('click', e => {
    const t = e.target.closest('[data-char],[data-action]');
    if (!t || t === trackpoint) return;
    if (tsDidDrag && t.closest('#row-term-inner')) { tsDidDrag = false; return; }
    if (v3DidDrag && !t.closest('#row-term') && !t.closest('#variant-toggle')) { v3DidDrag = false; return; }
    const ch  = t.dataset.char;
    const act = t.dataset.action;

    if (ch !== undefined) {
      if (variant === 2 && ch === ' ') return; // spacebar is drag pad in v2
      if (/^[a-zA-Z]$/.test(ch)) {
        if (ctrl) { handleCtrlKey(ch.toLowerCase()); return; }
        const out = shift ? ch.toUpperCase() : ch.toLowerCase();
        if (shift) {
          shift = false;
          btnShift.classList.remove('on');
          document.getElementById('btn-shift-top').classList.remove('on');
        }
        typeChar(out);
      } else {
        typeChar(ch);
      }
      return;
    }
    if (act) handleAction(act);
  });

  // ── Physical keyboard ─────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter')      { e.preventDefault(); handleAction('enter'); return; }
    if (e.key === 'Escape')     { handleAction('esc'); return; }
    if (e.key === 'Backspace')  { e.preventDefault(); if (e.ctrlKey) handleCtrlKey('w'); else handleAction('del'); return; }
    if (e.key === 'Tab')        { e.preventDefault(); handleAction('tab'); return; }
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (e.ctrlKey) handleArrow(e.shiftKey ? 'sel-word-left'  : 'word-left');
      else           handleArrow(e.shiftKey ? 'sel-left'        : 'left');
      return;
    }
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (e.ctrlKey) handleArrow(e.shiftKey ? 'sel-word-right' : 'word-right');
      else           handleArrow(e.shiftKey ? 'sel-right'       : 'right');
      return;
    }
    if (e.key === 'ArrowUp')   { e.preventDefault(); handleArrow('up');   return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); handleArrow('down'); return; }
    if (e.ctrlKey) {
      const k = e.key.toLowerCase();
      if (['c','l','u','w'].includes(k)) { e.preventDefault(); handleCtrlKey(k); return; }
    }
    if (!e.ctrlKey && !e.metaKey && !e.altKey && e.key.length === 1) {
      typeChar(e.key);
    }
  });

  // ── Touch-bar drag-scroll ─────────────────────
  const termInner = document.getElementById('row-term-inner');
  let tsDown = false, tsDidDrag = false, tsX0 = 0, tsSL0 = 0;

  termInner.addEventListener('pointerdown', e => {
    tsDown = true; tsDidDrag = false;
    tsX0 = e.clientX; tsSL0 = termInner.scrollLeft;
    termInner.style.cursor = 'grabbing';
  });
  termInner.addEventListener('pointermove', e => {
    if (!tsDown) return;
    const dx = e.clientX - tsX0;
    if (Math.abs(dx) > 2) termInner.scrollLeft = tsSL0 - dx; // scroll starts early
    if (Math.abs(dx) > 8) tsDidDrag = true;                   // block key only past touch-slop
  });
  termInner.addEventListener('pointerup', () => {
    tsDown = false;
    termInner.style.cursor = '';
  });
  termInner.addEventListener('pointercancel', () => {
    tsDown = false; tsDidDrag = false;
    termInner.style.cursor = '';
  });

  // ── Variant toggle ────────────────────────────
  let variant = 1;
  const spaceBtn = document.querySelector('.bkey-space');

  function setVariant(v) {
    variant = v;
    document.body.classList.toggle('v2', v === 2);
    document.body.classList.toggle('v3', v === 3);
    document.getElementById('vt1').classList.toggle('active', v === 1);
    document.getElementById('vt2').classList.toggle('active', v === 2);
    document.getElementById('vt3').classList.toggle('active', v === 3);
  }

  document.getElementById('variant-toggle').addEventListener('click', e => {
    const t = e.target.closest('.vtab');
    if (t) setVariant(parseInt(t.dataset.v));
  });

  // ── v2: spacebar drag pad ─────────────────────
  const SP_STEP = 7;
  let spDown = false, spMoved = false, spLastX = 0, spLastY = 0, spAccX = 0, spAccY = 0;

  spaceBtn.addEventListener('pointerdown', e => {
    if (variant !== 2) return;
    spDown = true; spMoved = false;
    spLastX = e.clientX; spLastY = e.clientY;
    spAccX = 0; spAccY = 0;
    spaceBtn.setPointerCapture(e.pointerId);
    spaceBtn.style.cursor = 'grabbing';
    e.preventDefault();
  });

  spaceBtn.addEventListener('pointermove', e => {
    if (!spDown || variant !== 2) return;
    const dx = e.clientX - spLastX, dy = e.clientY - spLastY;
    spLastX = e.clientX; spLastY = e.clientY;
    spAccX += dx; spAccY += dy;
    if (Math.abs(spAccX) > 3 || Math.abs(spAccY) > 3) {
      document.body.classList.add('v2-dragging');
    }
    while (spAccX >=  SP_STEP) { handleArrow('right'); spAccX -= SP_STEP; spMoved = true; }
    while (spAccX <= -SP_STEP) { handleArrow('left');  spAccX += SP_STEP; spMoved = true; }
    while (spAccY >=  SP_STEP) { handleArrow('down');  spAccY -= SP_STEP; spMoved = true; }
    while (spAccY <= -SP_STEP) { handleArrow('up');    spAccY += SP_STEP; spMoved = true; }
    e.preventDefault();
  });

  function spStop() {
    if (spDown && !spMoved) typeChar(' '); // clean tap → type space
    spDown = false;
    document.body.classList.remove('v2-dragging');
    spaceBtn.style.cursor = '';
  }
  spaceBtn.addEventListener('pointerup',     spStop);
  spaceBtn.addEventListener('pointercancel', spStop);

  // ── v3: whole kbd-body + terminal as trackpad ─
  const appEl  = document.getElementById('app');
  const kbdBody = document.getElementById('kbd-body');
  const V3_STEP = 7;
  let v3Down = false, v3DidDrag = false;
  let v3LastX = 0, v3LastY = 0, v3AccX = 0, v3AccY = 0;

  // v3 cursor mode is initiated exclusively from the trackpoint.
  // setPointerCapture on the trackpoint means the drag naturally
  // follows the finger across the whole keyboard — no appEl handler needed.

  // ── Trackpoint — radial pie-menu ─────────────
  const radial  = document.getElementById('tp-radial');
  const secEls  = {
    up:    document.getElementById('sec-up'),
    right: document.getElementById('sec-right'),
    down:  document.getElementById('sec-down'),
    left:  document.getElementById('sec-left'),
  };
  const arrEls  = {
    up:    document.querySelector('.tp-arr-up'),
    right: document.querySelector('.tp-arr-right'),
    down:  document.querySelector('.tp-arr-down'),
    left:  document.querySelector('.tp-arr-left'),
  };
  const v3SecEls = {
    up:    document.getElementById('v3-sec-up'),
    right: document.getElementById('v3-sec-right'),
    down:  document.getElementById('v3-sec-down'),
    left:  document.getElementById('v3-sec-left'),
  };
  const tpNub = document.getElementById('tp-nub');

  const DEAD_ZONE   = 18;   // px from centre before direction locks
  const FIRST_DELAY = 320;  // ms before auto-repeat starts
  const REPEAT_MS   = 75;   // ms between repeats

  let tpDown      = false;
  let tpCX        = 0, tpCY = 0;   // fixed centre of trackpoint in viewport px
  let tpCurDir    = null;
  let tpRepeatTmr = null;
  let tpRepeatInt = null;

  function tpClearRepeat() {
    clearTimeout(tpRepeatTmr);
    clearInterval(tpRepeatInt);
    tpRepeatTmr = tpRepeatInt = null;
  }

  function tpActivate(dir) {
    if (dir === tpCurDir) return;
    // Deactivate previous
    if (tpCurDir) {
      if (variant === 3) {
        v3SecEls[tpCurDir].classList.remove('active');
      } else {
        secEls[tpCurDir].classList.remove('active');
        arrEls[tpCurDir].classList.remove('active');
      }
      tpClearRepeat();
    }
    tpCurDir = dir;
    if (!dir) return;
    // Activate new
    if (variant === 3) {
      v3SecEls[dir].classList.add('active');
    } else {
      secEls[dir].classList.add('active');
      arrEls[dir].classList.add('active');
    }
    handleArrow(dir);
    tpRepeatTmr = setTimeout(() => {
      tpRepeatInt = setInterval(() => handleArrow(dir), REPEAT_MS);
    }, FIRST_DELAY);
  }

  function tpAngleToDir(dx, dy) {
    const a = Math.atan2(dy, dx); // -π … +π, 0 = right
    if (a > -Math.PI / 4 && a <= Math.PI / 4)       return 'right';
    if (a >  Math.PI / 4 && a <= 3 * Math.PI / 4)   return 'down';
    if (a > -3 * Math.PI / 4 && a <= -Math.PI / 4)  return 'up';
    return 'left';
  }

  function tpStop() {
    tpDown = false;
    tpActivate(null);
    tpCurDir = null;
    tpClearRepeat();
    radial.classList.remove('visible');
    trackpoint.classList.remove('dragging');
    document.body.classList.remove('v3-dragging');
    tpNub.style.transform = ''; // reset nub to centre
  }

  trackpoint.addEventListener('pointerdown', e => {
    tpDown = true;
    const r = trackpoint.getBoundingClientRect();
    tpCX = r.left + r.width  / 2;
    tpCY = r.top  + r.height / 2;
    if (variant !== 3) {
      radial.style.left = tpCX + 'px';
      radial.style.top  = tpCY + 'px';
      radial.classList.add('visible');
    } else {
      document.body.classList.add('v3-dragging'); // dim keyboard immediately on trackpoint touch
    }
    trackpoint.setPointerCapture(e.pointerId);
    trackpoint.classList.add('dragging');
    e.preventDefault();
  });

  trackpoint.addEventListener('pointermove', e => {
    if (!tpDown) return;
    const dx = e.clientX - tpCX;
    const dy = e.clientY - tpCY;
    // V3: move nub inside the joystick circle
    if (variant === 3) {
      const dist = Math.hypot(dx, dy);
      const maxR = 30; // max nub travel from centre
      const clamp = Math.min(dist, maxR);
      const angle = Math.atan2(dy, dx);
      tpNub.style.transform = `translate(${clamp * Math.cos(angle)}px, ${clamp * Math.sin(angle)}px)`;
    }
    if (Math.hypot(dx, dy) < DEAD_ZONE) {
      tpActivate(null);
    } else {
      tpActivate(tpAngleToDir(dx, dy));
    }
    e.preventDefault();
  });

  trackpoint.addEventListener('pointerup',     tpStop);
  trackpoint.addEventListener('pointercancel', tpStop);

  // ── Boot ──────────────────────────────────────
  appendOutput('termkeyboard v1.2', 'line-info');
  appendOutput("type 'help' for commands", 'line-info');
  newPrompt();
</script>
</body>
</html>
